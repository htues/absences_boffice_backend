spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:pgdevelopment}:${POSTGRES_PORT:5432}/${POSTGRES_DB:absencesbo}
    username: ${POSTGRES_USER:app}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver

  hikari:
    minimum-idle: 5
    maximum-pool-size: 10
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    com.hftamayo.java.absencesbobe: INFO
    com.zaxxer.hikari: WARN
    # Uncomment only if you really want parameter binding noise (it gets loud)
    # org.hibernate.orm.jdbc.bind: TRACE

rate:
  limiter:
    default:
      capacity: 100
      refill-rate: 10
      refill-duration: PT1M

  roles:
    ADMIN:
      capacity: 500
      refill-rate: 50
      refill-duration: PT30S
    SUPERVISOR:
      capacity: 200
      refill-rate: 20
      refill-duration: PT1M
    USER:
      capacity: 100
      refill-rate: 10
      refill-duration: PT1M